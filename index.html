<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMemory Match</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="app-container">
        
      <section id="main-menu" class="screen">
        <div class="logo-container">
        <img src="assets/pokememory%20match.png" id="game-logo" alt="PokeMemory Match Logo">
        </div>
    
    <form id="game-config">
                <div class="form-group">
                    <label for="config-theme">Elige la Región:</label>
                    <select id="config-theme" required>
                        <option value="kanto">Kanto (Gen 1)</option>
                        <option value="hoenn">Hoenn (Gen 3)</option>
                        <option value="sinnoh">Sinnoh (Gen 4)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="config-difficulty">Dificultad (Tablero):</label>
                    <select id="config-difficulty" required>
                        <option value="easy">Fácil (4x4 - 16 Cartas)</option>
                        <option value="medium">Intermedio (6x6 - 36 Cartas)</option>
                        <option value="hard">Difícil (8x8 - 64 Cartas)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="config-mode">Modo de Juego:</label>
                    <select id="config-mode" required>
                        <option value="free">Modo Libre (Cronómetro)</option>
                        <option value="time">Contrarreloj (Cuenta Atrás)</option>
                        <option value="pvp">Jugador vs Jugador (Local)</option>
                    </select>
                </div>

                <button type="submit" id="btn-start">Iniciar Juego</button>
            </form>
        </section>

        <section id="game-screen" class="screen hidden">
    <div id="game-hud">
    <div id="hud-region">Región: KANTO</div>
    
    <div id="hud-solo-info">
        <span id="hud-timer">00:00</span>
    </div>

    <div id="hud-pvp-info" class="hidden">
        <span id="score-p1">P1: 0</span>
        <span id="score-p2">P2: 0</span>
    </div>

    <button id="exit-game-btn">Salir</button>
</div>

            <main id="game-board">
                </main>
        </section>

       <div id="end-screen" class="screen hidden">
            <h2>¡Partida Terminada!</h2>
            <p id="end-message"></p> 
            <p id="end-time-result"></p>
             <button id="restart-btn">Volver al Menú</button>
    </div>
    <script src="theme.js"></script>
    <script src="board.js"></script>
    <script src="timer.js"></script>
    <script src="game.js"></script>
    <script src="menu.js"></script>
</body>
</html>
