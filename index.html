<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMemory Match</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="app-container">
        
      <section id="main-menu" class="screen">
        <div class="logo-container">
        <img src="assets/pokememory%20match.png" id="game-logo" alt="PokeMemory Match Logo">
        </div>
    
    <form id="game-config">
                <div class="form-group">
                    <label for="config-theme">Elige la Región:</label>
                    <select id="config-theme" required>
                        <option value="kanto">Kanto (Gen 1)</option>
                        <option value="hoenn">Hoenn (Gen 3)</option>
                        <option value="sinnoh">Sinnoh (Gen 4)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="config-difficulty">Dificultad (Tablero):</label>
                    <select id="config-difficulty" required>
                        <option value="easy">Fácil (4x4 - 16 Cartas)</option>
                        <option value="medium">Intermedio (6x6 - 36 Cartas)</option>
                        <option value="hard">Difícil (8x8 - 64 Cartas)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="config-mode">Modo de Juego:</label>
                    <select id="config-mode" required>
                        <option value="free">Modo Libre (Cronómetro)</option>
                        <option value="time">Contrarreloj (Cuenta Atrás)</option>
                    </select>
                </div>

                <button type="submit" id="btn-start">Iniciar Juego</button>
            </form>
        </section>

        <section id="game-screen" class="screen hidden">
            <div id="game-hud">
                <span id="hud-region">Región: Kanto</span>
                <span id="hud-timer">Tiempo: 00:00</span>
                <button id="btn-back" onclick="location.reload()">Volver al Menú</button>
            </div>

            <main id="game-board">
                </main>
        </section>

        <section id="end-screen" class="screen hidden">
            <h1 id="end-title">¡Victoria!</h1>
            <div id="end-stats">
                <p id="end-message">¡Lograste emparejar todos los Pokémon!</p>
                <p>Tiempo final: <span id="end-time-result">00:00</span></p>
            </div>
            <button id="btn-restart" onclick="location.reload()">Jugar de Nuevo</button>
        </section>

    </div>

    <script src="theme.js"></script>
    <script src="board.js"></script>
    <script src="timer.js"></script>
    <script src="game.js"></script>
    <script src="menu.js"></script>
</body>
</html>
